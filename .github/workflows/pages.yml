name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "skills/*/SKILL.md"
      - "modules/*/module.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Validate generated catalogs
        run: python3 docs/scripts/build_catalog.py --check
      - name: Validate documentation source
        run: python3 docs/scripts/validate_docs.py
      - name: Run documentation tests
        run: python3 -m unittest discover -s docs/tests -v
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
