name: skills-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile helpers
        run: python -m compileall -q skills
      - name: All shared runtime tests
        run: python -m unittest discover -s skills/_shared -p 'test*.py' -v
      - name: Repository contract tests
        run: python skills/_shared/test_all_skill_scripts.py
      - name: Release compatibility
        run: python skills/_shared/ai_sdlc_compatibility.py --skip-git-audit --format toon
      - name: Per-skill tests
        run: python skills/_shared/test_each_skill_tests.py
