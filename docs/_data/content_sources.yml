  - source_id: MS-GENAI-BEGINNERS
    title: Generative AI for Beginners
    publisher_or_owner: Microsoft
    canonical_url: https://github.com/microsoft/generative-ai-for-beginners
    source_type: git-repository
    version_release_tag_or_commit: 645f932514e9f22f688c8feb3e49a7a7f2eb6f1b
    reviewed_date: 2026-07-21
    verified_license: MIT
    license_url: https://github.com/microsoft/generative-ai-for-beginners/blob/645f932514e9f22f688c8feb3e49a7a7f2eb6f1b/LICENSE
    reuse_class: adaptable-with-verification
    material_consulted: [course map, Learn and Build distinction, responsible-AI and introductory topic coverage]
    adopted_concepts: [progressive beginner sequence, concept then practice rhythm, further-learning prompts]
    excluded_material: [lesson text, headings, videos, code, assignments, diagrams, images, quizzes, vendor setup]
    destination_pages: [docs/start.md, docs/learn/ai-foundations.md, docs/learn/guided-practice.md]
    adaptation_summary: "Adopted idea: progressive concept-to-practice sequencing. Curriculum relevance: beginners need prerequisite evidence before tool use. Harness translation: Can explain, Can do, Can prove gates connect generation to repository evidence and authority. Original replacement: the release-note risk classifier and retry-evidence labs. Resulting difference: ten substantial harness chapters replace the source course map and build lessons. Deliberately excluded: lesson wording, sequence, assignments, quizzes, media, code, diagrams, and vendor setup."
    attribution_requirement: Identify Microsoft, the pinned commit, and the MIT license when materially cited.
    reviewer: Lead documentation engineer
    review_status: source-facts-verified; independent-review-corrections-pending
  - source_id: MS-AGENTS-BEGINNERS
    title: AI Agents for Beginners
    publisher_or_owner: Microsoft
    canonical_url: https://github.com/microsoft/ai-agents-for-beginners
    source_type: git-repository
    version_release_tag_or_commit: b7f34fd824767162f484e03cc500e23c0966372f
    reviewed_date: 2026-07-21
    verified_license: MIT
    license_url: https://github.com/microsoft/ai-agents-for-beginners/blob/b7f34fd824767162f484e03cc500e23c0966372f/LICENSE
    reuse_class: adaptable-with-verification
    material_consulted: [agent fundamentals, tool use, planning, memory, orchestration, security topic inventory]
    adopted_concepts: [introduce agent parts before orchestration, pair explanation with bounded practice]
    excluded_material: [lesson sequence, framework code, cloud setup, videos, examples, diagrams, quizzes]
    destination_pages: [docs/learn/agents-tools-and-subagents.md, docs/learn/multi-role-review.md]
    adaptation_summary: "Adopted idea: introduce agent components before orchestration and pair concepts with practice. Curriculum relevance: learners must bound tool use before multi-role work. Harness translation: repository state, least privilege, read-only delegation, evidence, stop conditions, and accountable handoffs. Original replacement: the eight-file link scan and immutable review-fixture labs. Resulting difference: the chapters organize decisions around harness controls rather than frameworks or the source lesson sequence. Deliberately excluded: prose, code, cloud setup, videos, examples, diagrams, quizzes, and headings."
    attribution_requirement: Identify Microsoft, the pinned commit, and the MIT license when materially cited.
    reviewer: Lead documentation engineer
    review_status: source-facts-verified; independent-review-corrections-pending
