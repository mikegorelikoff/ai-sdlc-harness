      - Adaptive rigor: explanation/adaptive-rigor.md
      - Artifact authority: explanation/artifact-authority.md
      - Feature state machine: explanation/state-machine.md
      - Traceability: explanation/traceability.md
      - Context and quality: explanation/context-quality.md
      - Decision continuity: explanation/decisions.md
      - Workflow handoffs: explanation/handoffs.md
      - TOON-first artifacts: explanation/toon-first.md
      - Layered configuration: explanation/configuration.md
      - Optional modules: explanation/modules.md
