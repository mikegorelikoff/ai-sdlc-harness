name: Bug report
description: Report a reproducible defect in the harness, a skill, a helper, or its documentation.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues first. Never include credentials, private source, customer data, or vulnerability details.
  - type: input
    id: version
    attributes:
      label: Harness version or commit
      placeholder: v2.0.0-rc.1 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include OS, agent host, runtime versions, and package-manager versions.
      placeholder: macOS 15, Codex, Node 22.20, Python 3.12
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Give the smallest safe command sequence that demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include relevant, redacted output and links to logs if available.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Validation already performed
      description: List tests, checks, or a minimal reproduction repository.
    validations:
      required: false
