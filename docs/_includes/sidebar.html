<aside class="docs-sidebar" aria-label="Documentation sections">
  <p class="sidebar-label">Documentation</p>
  <nav class="sidebar-nav">
    {% for item in site.data.navigation %}
      <div class="sidebar-group">
        <a class="sidebar-root{% if page.url == item.url %} active{% endif %}" href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
        {% if item.children %}
          <div class="sidebar-children">
            {% for child in item.children %}
              <a href="{{ child.url | relative_url }}"{% if page.url == child.url %} class="active" aria-current="page"{% endif %}>{{ child.title }}</a>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    {% endfor %}
  </nav>
  <div class="sidebar-note">
    <span class="status-dot" aria-hidden="true"></span>
    <div>
      <strong>Portable by design</strong>
      <p>Repository-local skills. Agent-agnostic workflows.</p>
    </div>
  </div>
</aside>
