name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "skills/**"
      - "modules/**"
      - "compatibility/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install documentation dependencies
        run: python3 -m pip install -r requirements-docs.txt
      - name: Validate generated catalogs
        run: python3 docs/scripts/build_catalog.py --check
      - name: Validate documentation source
        run: python3 docs/scripts/validate_docs.py
      - name: Smoke test project-scoped skill installation
        run: python3 skills/_shared/ai_sdlc_install_smoke.py --mode npx
      - name: Run documentation tests
        run: python3 -m unittest discover -s docs/tests -v
      - name: Build documentation
        run: mkdocs build --strict
      - name: Validate rendered site
        run: python3 docs/scripts/validate_rendered.py site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
