  - source_id: DAIR-PROMPT-GUIDE
    title: Prompt Engineering Guide
    publisher_or_owner: DAIR.AI
    canonical_url: https://github.com/dair-ai/Prompt-Engineering-Guide
    source_type: git-repository
    version_release_tag_or_commit: 57673726396dd94acb23bdb1e67f27c78ee85a8e
    reviewed_date: 2026-07-21
    verified_license: MIT
    license_url: https://github.com/dair-ai/Prompt-Engineering-Guide/blob/57673726396dd94acb23bdb1e67f27c78ee85a8e/LICENSE.md
    reuse_class: adaptable-with-verification
    material_consulted: [prompt component and risk topic indexes, context engineering, evaluation, retrieval, agent coverage]
    adopted_concepts: [separate prompt components, compare weak and bounded tasks, evaluate prompts with evidence]
    excluded_material: [prompt examples, taxonomy order, lesson text, diagrams, notebooks, model-specific recipes]
    destination_pages: [docs/learn/prompt-engineering.md, docs/learn/context-and-verification.md]
    adaptation_summary: "Adopted idea: prompts have separable components and should be evaluated, not admired. Curriculum relevance: harness work needs bounded, testable requests. Harness translation: Outcome, Constraints, Context, Acceptance and evidence, Output plus source authority and freshness. Original replacement: the cross-role notification request and invoice-retry evidence pack. Resulting difference: two chapters separate task definition from context/evidence decisions instead of following the source taxonomy. Deliberately excluded: prompt examples, taxonomy order, prose, diagrams, notebooks, and model recipes."
    attribution_requirement: Identify DAIR.AI, the pinned commit, and the MIT license when materially cited.
    reviewer: Lead documentation engineer
    review_status: source-facts-verified; independent-review-corrections-pending
