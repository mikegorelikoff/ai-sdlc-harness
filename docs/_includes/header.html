<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="AI SDLC Harness home">
      <span class="brand-mark" aria-hidden="true">
        <span></span><span></span><span></span>
      </span>
      <span class="brand-copy">
        <strong>AI SDLC</strong>
        <small>Harness</small>
      </span>
    </a>

    <nav class="header-nav" aria-label="Primary navigation">
      {% for item in site.data.navigation %}
        {% unless item.hide_header %}<a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>{% endunless %}
      {% endfor %}
    </nav>

    <div class="header-actions">
      <a class="github-link" href="https://github.com/{{ site.repository }}" aria-label="Open repository on GitHub">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .8a11.4 11.4 0 0 0-3.6 22.2c.6.1.8-.2.8-.6v-2.2c-3.4.7-4.1-1.4-4.1-1.4-.5-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.8.1-.8 1.3.1 1.9 1.3 1.9 1.3 1.1 1.9 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.4-5.5-5.6 0-1.2.4-2.3 1.2-3.1-.1-.3-.5-1.6.1-3.1 0 0 1-.3 3.2 1.2a11 11 0 0 1 5.8 0C16.7 5 17.7 5.3 17.7 5.3c.6 1.5.2 2.8.1 3.1.8.8 1.2 1.9 1.2 3.1 0 4.3-2.8 5.3-5.5 5.6.4.4.8 1.1.8 2.2v3.1c0 .4.2.7.8.6A11.4 11.4 0 0 0 12 .8Z"/></svg>
        <span>GitHub</span>
      </a>
      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-navigation">
        <span class="sr-only">Toggle navigation</span>
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <nav class="mobile-nav" id="mobile-navigation" aria-label="Mobile navigation">
    <div class="mobile-nav-inner">
      {% for item in site.data.navigation %}
        {% unless item.hide_header %}<a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>{% endunless %}
      {% endfor %}
    </div>
  </nav>
</header>
