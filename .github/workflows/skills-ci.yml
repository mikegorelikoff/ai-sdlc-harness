name: skills-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile helpers
        run: python -m compileall -q skills
      - name: Shared state tests
        run: python skills/_shared/test_state_machine.py
      - name: Shared scaffold tests
        run: python skills/_shared/test_artifact_scaffold.py
      - name: Migration tests
        run: python skills/_shared/test_migration.py
      - name: Repository contract tests
        run: python skills/_shared/test_all_skill_scripts.py
      - name: Per-skill tests
        run: python skills/_shared/test_each_skill_tests.py
