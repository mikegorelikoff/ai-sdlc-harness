site_name: AI SDLC Harness
site_description: A traceable, adaptive delivery harness for teams building software with AI assistants.
site_url: https://mikegorelikoff.github.io/ai-sdlc-harness/
repo_url: https://github.com/mikegorelikoff/ai-sdlc-harness
repo_name: mikegorelikoff/ai-sdlc-harness
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
use_directory_urls: true
strict: true

theme:
  name: material
  language: en
  icon:
    logo: material/source-branch
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mikegorelikoff/ai-sdlc-harness
      name: AI SDLC Harness on GitHub

copyright: Copyright &copy; 2026 AI SDLC Harness contributors

exclude_docs: |
  scripts/
  tests/

